name: Update LeetCode Heatmap

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch LeetCode Heatmap SVG
        run: |
          curl -o assets/leetcode-heatmap.svg \
            "https://leetcard.jacoblin.cool/smirk-dev?ext=heatmap&cache=0"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/leetcode-heatmap.svg
          git diff --staged --quiet || git commit -m "chore: update LeetCode heatmap [skip ci]"
          git push
